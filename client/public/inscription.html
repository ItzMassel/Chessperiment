<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chessperiment Inscription — Huge Closeup</title>
    <!-- Fonts matching the project -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0C0B09;
            --amber-300: #fcd34d;
            --amber-500: #f59e0b;
            --orange-600: #ea580c;
            --stone-400: #a8a29e;
            --amber-400: #fbbf24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
            z-index: 10;
        }

        .container {
            display: flex;
            align-items: center;
            gap: 4vw;
            padding: 5vw;
            transform: scale(1.1);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(1); }
            to { opacity: 1; transform: scale(1.1); }
        }

        .logo-img {
            width: 15vw;
            height: 15vw;
            object-fit: contain;
            animation: logoFloat 6s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(245, 158, 11, 0.2));
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(12deg); }
        }

        .chess-svg {
            height: clamp(60px, 18vw, 300px);
            overflow: visible;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            user-select: none;
        }

        .chess-text {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 100px;
            letter-spacing: -0.04em;
        }

        .periment-wrap {
            display: flex;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(20px, 6vw, 100px);
            letter-spacing: -0.05em;
            color: rgba(168, 162, 158, 0.8);
            position: relative;
            margin-left: 0.5vw;
        }

        .bracket {
            color: rgba(245, 158, 11, 0.3);
            font-weight: 700;
            margin: 0 0.2vw;
        }

        .periment {
            transition: color 0.3s ease;
            color: #d6d3d1; 
        }

        .cursor {
            display: inline-block;
            width: 0.8vw;
            height: 6vw;
            max-height: 80px;
            background-color: var(--amber-500);
            margin-left: 1vw;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .glow {
            position: absolute;
            top: 50%;
            left: 20%;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.05) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        .meta {
            position: fixed;
            bottom: 40px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            color: rgba(168, 162, 158, 0.3);
        }

        #export-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: var(--amber-400);
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        #export-btn:hover {
            background: var(--amber-500);
            color: var(--bg);
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

        <!-- Chess Text -->
        <svg viewBox="0 0 300 100" class="chess-svg">
            <defs>
                <linearGradient id="chessGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#fcd34d;stop-opacity:1" />
                    <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
                </linearGradient>
            </defs>
            <text x="0" y="80" class="chess-text" fill="url(#chessGradient)">CHESS</text>
        </svg>

        <!-- Periment Text -->
        <div class="periment-wrap">
            <span class="bracket">[</span>
            <span class="periment">periment</span>
            <span class="bracket">]</span>
            <span class="cursor"></span>
        </div>
    </div>

    <!-- Meta Info -->
    <div class="meta">Asset Export System v2.0 // 8K Resolution Mode</div>

    <!-- Export Button -->
    <button id="export-btn">Export High-Res PNG</button>

    <script>
        const btn = document.getElementById('export-btn');
        btn.addEventListener('click', () => {
            const container = document.querySelector('.container');
            const meta = document.querySelector('.meta');
            const noise = document.querySelector('.noise');
            const glow = document.querySelector('.glow');

            // Hide UI for capture
            btn.style.opacity = '0';
            meta.style.opacity = '0';
            noise.style.opacity = '0';
            glow.style.opacity = '0';
            document.body.style.backgroundColor = 'transparent';

            html2canvas(container, {
                backgroundColor: null,
                scale: 5, // Extra high resolution
                useCORS: true,
                logging: false,
                allowTaint: true,
                onclone: (clonedDoc) => {
                    const clonedContainer = clonedDoc.querySelector('.container');
                    
                    // Reset container for clipping-free capture
                    clonedContainer.style.transform = 'none';
                    clonedContainer.style.padding = '150px'; // Massive padding to prevent clipping
                    clonedContainer.style.margin = '0';
                    clonedContainer.style.display = 'flex';
                    clonedContainer.style.gap = '4vw';
                    clonedContainer.style.alignItems = 'center';
                    clonedContainer.style.width = 'auto';
                    clonedContainer.style.height = 'auto';
                    clonedContainer.style.animation = 'none';
                    
                    // Force 100% Brightness and Opacity
                    const chessSvg = clonedDoc.querySelector('.chess-svg');
                    if (chessSvg) {
                        chessSvg.style.filter = 'none';
                        chessSvg.style.animation = 'none';
                        const chessText = chessSvg.querySelector('.chess-text');
                        if (chessText) chessText.setAttribute('fill', 'url(#chessGradient)');
                    }

                    const logoImg = clonedDoc.querySelector('.logo-img');
                    if (logoImg) {
                        logoImg.style.filter = 'none';
                        logoImg.style.animation = 'none';
                        logoImg.style.transform = 'none';
                    }

                    const perimentWrap = clonedDoc.querySelector('.periment-wrap');
                    if (perimentWrap) {
                        perimentWrap.style.color = '#FFFFFF';
                        perimentWrap.style.opacity = '1';
                    }

                    const brackets = clonedDoc.querySelectorAll('.bracket');
                    brackets.forEach(b => {
                        b.style.color = '#f59e0b'; // Bright amber
                        b.style.opacity = '1';
                    });

                    const periment = clonedDoc.querySelector('.periment');
                    if (periment) {
                        periment.style.color = '#FFFFFF';
                        periment.style.opacity = '1';
                    }

                    const cursor = clonedDoc.querySelector('.cursor');
                    if (cursor) {
                        cursor.style.opacity = '1';
                        cursor.style.backgroundColor = '#f59e0b';
                        cursor.style.animation = 'none';
                    }
                }
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'chessperiment-inscription.png';
                link.href = canvas.toDataURL('image/png');
                link.click();

                // Restore styles
                btn.style.opacity = '1';
                meta.style.opacity = '1';
                noise.style.opacity = '1';
                glow.style.opacity = '1';
                document.body.style.backgroundColor = '';
            }).catch(err => {
                console.error(err);
                btn.style.opacity = '1';
                meta.style.opacity = '1';
                noise.style.opacity = '1';
                glow.style.opacity = '1';
                document.body.style.backgroundColor = '';
            });
        });
    </script>
</body>
</html>
